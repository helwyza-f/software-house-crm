version: '3.8'

services:
  sh-crm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: SH-CRM-App
    restart: always
    environment:
      - DATABASE_PATH=/app/data/clients.db
      - PORT=3000
    volumes:
      - crm-data:/app/data
    ports:
      - "8089:3000" # Expose directly on port 8089 of the server host

    # === OPTION: Enable Traefik Reverse Proxy Routing ===
    # To connect to Traefik, uncomment the lines below, configure your domain, and run docker compose.
    # networks:
    #   - traefik-network
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.sh-crm.rule=Host(`crm.yoursoftwarehouse.com`)"
    #   - "traefik.http.routers.sh-crm.entrypoints=websecure"
    #   - "traefik.http.routers.sh-crm.tls=true"
    #   - "traefik.http.routers.sh-crm.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.sh-crm.loadbalancer.server.port=3000"

volumes:
  crm-data:
    driver: local

# networks:
#   traefik-network:
#     external: true
