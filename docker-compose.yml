version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: SH-CRM-Db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: crm_secure_pass_198
      POSTGRES_DB: crm
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      - "5432:5432" # Keep internal/external port exposed if needed for backup, or remove if strictly private

  sh-crm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: SH-CRM-App
    restart: always
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://postgres:crm_secure_pass_198@db:5432/crm
      - PORT=3000
    ports:
      - "80:3000" # Expose Next.js app directly on standard HTTP port 80

volumes:
  pg-data:
    driver: local
