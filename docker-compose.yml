version: '3.8'

services:
  sh-crm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: SH-CRM-App
    restart: always
    environment:
      - DATABASE_PATH=/app/data/clients.db
      - PORT=3000
    volumes:
      - crm-data:/app/data
    ports:
      - "8089:3000" # Keep exposed as fallback
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-network"
      - "traefik.http.routers.sh-crm.rule=Host(`crm-dev.ayocuci.id`)"
      - "traefik.http.routers.sh-crm.entrypoints=websecure"
      - "traefik.http.routers.sh-crm.tls=true"
      - "traefik.http.routers.sh-crm.tls.certresolver=letsencrypt"
      - "traefik.http.services.sh-crm.loadbalancer.server.port=3000"

volumes:
  crm-data:
    driver: local

networks:
  traefik-network:
    external: true
