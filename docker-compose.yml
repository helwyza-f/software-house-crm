version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: SH-CRM-Db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: crm_secure_pass_198
      POSTGRES_DB: crm
    volumes:
      - pg-data:/var/lib/postgresql/data

  sh-crm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: SH-CRM-App
    restart: always
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://postgres:crm_secure_pass_198@db:5432/crm
      - PORT=3000
    ports:
      - "127.0.0.1:3000:3000"

  caddy:
    image: caddy:2-alpine
    container_name: SH-CRM-Proxy
    restart: always
    depends_on:
      - sh-crm
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config

volumes:
  pg-data:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local
